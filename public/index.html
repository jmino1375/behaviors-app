<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comportamientos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      max-width: 520px;
      width: 100%;
    }
    h1 { font-size: 1.5rem; color: #1a202c; margin-bottom: 0.5rem; text-align: center; }
    .subtitle { color: #718096; font-size: 0.9rem; text-align: center; margin-bottom: 2rem; }
    .section { margin-bottom: 1.75rem; }
    label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.6rem;
    }
    .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot-above { background: #48bb78; }
    .dot-below { background: #f56565; }
    textarea {
      width: 100%;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      min-height: 90px;
      transition: border-color 0.2s;
      outline: none;
    }
    textarea:focus { border-color: #667eea; }
    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      color: white;
      margin-top: 0.5rem;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-above { background: linear-gradient(135deg, #38a169, #48bb78); }
    .btn-below { background: linear-gradient(135deg, #c53030, #f56565); }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d3748;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .counter {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: center;
      gap: 2rem;
    }
    .count-item { text-align: center; }
    .count-num { font-size: 1.8rem; font-weight: 700; }
    .count-num.above { color: #38a169; }
    .count-num.below { color: #c53030; }
    .count-label { font-size: 0.75rem; color: #718096; margin-top: 2px; }
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 4px;
      background: #cbd5e0;
    }
    .conn-dot.connected { background: #48bb78; }
    .conn-status { font-size: 0.75rem; color: #a0aec0; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sobre y Bajo la Línea</h1>
    <p class="subtitle">Tu participación es anónima. Comparte libremente.</p>

    <div class="section">
      <label><span class="dot dot-above"></span>Comportamientos SOBRE la línea</label>
      <textarea id="above-text" placeholder="Describe un comportamiento positivo, constructivo o que suma al equipo..."></textarea>
      <button class="btn btn-above" onclick="submit('above')">Enviar comportamiento sobre la línea</button>
    </div>

    <div class="section">
      <label><span class="dot dot-below"></span>Comportamientos BAJO la línea</label>
      <textarea id="below-text" placeholder="Describe un comportamiento que resta, daña el clima o frena al equipo..."></textarea>
      <button class="btn btn-below" onclick="submit('below')">Enviar comportamiento bajo la línea</button>
    </div>

    <div class="counter">
      <div class="count-item">
        <div class="count-num above" id="count-above">0</div>
        <div class="count-label">Sobre la línea</div>
      </div>
      <div class="count-item">
        <div class="count-num below" id="count-below">0</div>
        <div class="count-label">Bajo la línea</div>
      </div>
    </div>
    <div class="conn-status"><span class="conn-dot" id="conn-dot"></span><span id="conn-text">Conectando...</span></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let ws, counts = { above: 0, below: 0 };

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onopen = () => setConn(true);
      ws.onclose = () => { setConn(false); setTimeout(connect, 2000); };
      ws.onerror = () => ws.close();
      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type === 'state') {
          counts.above = msg.behaviors.above.length;
          counts.below = msg.behaviors.below.length;
          updateCounts();
        } else if (msg.type === 'new_behavior') {
          counts[msg.kind]++;
          updateCounts();
        }
      };
    }

    function setConn(ok) {
      document.getElementById('conn-dot').className = 'conn-dot' + (ok ? ' connected' : '');
      document.getElementById('conn-text').textContent = ok ? 'Conectado' : 'Reconectando...';
    }

    function updateCounts() {
      document.getElementById('count-above').textContent = counts.above;
      document.getElementById('count-below').textContent = counts.below;
    }

    function submit(kind) {
      const el = document.getElementById(`${kind}-text`);
      const text = el.value.trim();
      if (!text) { showToast('Por favor escribe un comportamiento antes de enviar'); return; }
      if (!ws || ws.readyState !== 1) { showToast('Sin conexión, intenta de nuevo'); return; }
      ws.send(JSON.stringify({ type: 'submit', kind, text }));
      el.value = '';
      showToast('¡Enviado! Gracias por tu aporte.');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    connect();
  </script>
</body>
</html>
